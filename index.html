<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>360  ACADEMY — Login</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
   <link type="image/png" rel="icon" href="./assets/images/360.ico">
</head>
<body class="login-page">

  <div class="login-split">
    <!-- Left Panel -->
    <div class="login-brand">
      <div class="brand-content">
        <div class="brand-logo">
          <img src="./assets/images/360.jpeg" alt="Zenith Tutorial" class="brand-img" />
        </div>
        <h1 class="brand-name">360 ACADEMY</h1>
        <p class="brand-tagline">Excellence in Education.<br>Precision in Payments.</p>
        <div class="brand-stats">
          <div class="stat-item"><span class="stat-num" id="loginStatStudents">—</span><span class="stat-label">Students</span></div>
          <div class="stat-divider"></div>
          <div class="stat-item"><span class="stat-num" id="loginStatVIP">—</span><span class="stat-label">Active VIP</span></div>
        </div>
      </div>
      <div class="brand-bg-circles">
        <span class="bc bc1"></span><span class="bc bc2"></span><span class="bc bc3"></span>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="login-form-panel">
      <div class="login-form-wrap">
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-sub">Sign in to access your dashboard</p>

        <div class="role-toggle">
          <button class="role-btn active" data-role="admin" onclick="switchRole('admin',this)">Admin</button>
          <button class="role-btn" data-role="student" onclick="switchRole('student',this)">Student</button>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required />
          </div>
          <div class="form-group" id="adminPassGroup">
            <label>Password</label>
            <div class="input-icon-wrap">
              <input type="password" id="loginPassword" placeholder="Enter your password" />
              <button type="button" class="toggle-pw" onclick="togglePw()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="studentIdGroup" style="display:none" class="form-group">
            <label>Student ID / Serial Number</label>
            <input type="text" id="loginSerial" placeholder="Enter your serial number" />
          </div>
          <div id="loginError" class="form-error" style="display:none"></div>
          <button type="submit" class="btn-login" id="loginBtn">
            <span id="loginBtnText">Sign In</span>
            <div id="loginSpinner" class="btn-spinner" style="display:none"></div>
          </button>
        </form>

        <p class="login-note">This is a secure system. Unauthorized access is prohibited.</p>
      </div>
    </div>
  </div>

  <script src="./supabase.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
